input {
  file {
    path => "/var/log/algoengine/*.log"
    start_position => "beginning"
    sincedb_path => "/usr/share/logstash/data/sincedb/algoengine.db"
    discover_interval => 15
    stat_interval => 15
    add_field => {
      "service" => "algoengine"
      "environment" => "production"
    }
    tags => ["algoengine", "logfile"]
  }

  file {
    path => "/var/log/algoengine/error/*.log"
    start_position => "beginning"
    sincedb_path => "/usr/share/logstash/data/sincedb/algoengine_error.db"
    discover_interval => 15
    stat_interval => 15
    add_field => {
      "service" => "algoengine"
      "environment" => "production"
    }
    tags => ["algoengine", "error", "logfile"]
  }

  file {
    path => "/var/log/monitor/*.log"
    start_position => "beginning"
    sincedb_path => "/usr/share/logstash/data/sincedb/monitor.db"
    discover_interval => 15
    stat_interval => 15
    add_field => {
      "service" => "algoengine-monitor"
      "environment" => "production"
    }
    tags => ["monitor", "logfile"]
  }
}

filter {
  if "logfile" in [tags] {

    grok {
      match => {
        "message" => [
          "%{TIMESTAMP_ISO8601:log_timestamp} \| %{DATA:level_raw}\s*\| %{DATA:logger} \| %{DATA:funcName}:%{INT:lineno} \| %{GREEDYDATA:parsed_msg}",
          "%{TIMESTAMP_ISO8601:log_timestamp} \| %{DATA:level_raw}\s*\| %{DATA:logger} \| %{GREEDYDATA:parsed_msg}"
        ]
      }
      tag_on_failure => ["_grokparsefailure"]
    }

    if "_grokparsefailure" not in [tags] {
      mutate {
        replace => { "message" => "%{parsed_msg}" }
        remove_field => ["parsed_msg"]
      }

      date {
        match => ["log_timestamp", "yyyy-MM-dd HH:mm:ss,SSS", "yyyy-MM-dd HH:mm:ss"]
        target => "@timestamp"
      }

      ruby {
        code => '
          level_val = event.get("level_raw")
          if level_val
            level_clean = level_val.gsub(/\e\[[0-9;]*m/, "").strip
            event.set("level", level_clean)
          end
        '
      }

      mutate {
        remove_field => ["level_raw", "log_timestamp", "raw_message"]
      }

      if [level] == "DEBUG" {
        mutate { add_tag => ["verbose"] }
      }

      if [level] == "ERROR" or [level] == "CRITICAL" {
        mutate { add_tag => ["alert", "high_priority"] }
      }
    }
  }
}

output {
  if "_grokparsefailure" in [tags] {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "algoengine-logs-parsefailures-%{+YYYY.MM.dd}"
      manage_template => false
    }
  } else {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "algoengine-logs-%{+YYYY.MM.dd}"
      manage_template => false
      action => "create"
    }
  }
}
