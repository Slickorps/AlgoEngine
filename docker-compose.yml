# =============================================================================
# AlgoEngine - Docker Compose Configuration
# =============================================================================
#
# Spins up the full AlgoEngine stack:
#   - algoengine: The core trading engine (Python)
#   - dashboard: Real-time monitoring dashboard (TypeScript/Node.js)
#   - redis: Cache and pub/sub for market data (optional)
#
# Usage:
#   docker compose up -d          # Start all services
#   docker compose down           # Stop all services
#   docker compose logs -f        # Follow logs
# =============================================================================

version: "3.9"

services:
  # ── Core Trading Engine ──────────────────────────────────────────────
  algoengine:
    build:
      context: .
      dockerfile: Dockerfile
    image: algoengine:latest
    container_name: algoengine-core
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - ALGOENGINE_ENV=${ALGOENGINE_ENV:-production}
      - ALGOENGINE_MODE=${ALGOENGINE_MODE:-paper}
      - ALGOENGINE_PORT=8000
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - TZ=${TZ:-UTC}
    env_file:
      - .env
    volumes:
      - ./config:/app/config:ro
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - algo-network

  # ── Real-time Dashboard ──────────────────────────────────────────────
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    image: algoengine-dashboard:latest
    container_name: algoengine-dashboard
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - DASHBOARD_PORT=3000
      - ENGINE_API_URL=http://algoengine:8000
      - ENGINE_WS_URL=ws://algoengine:8000/ws
      - DASHBOARD_REFRESH=2000
      - TZ=${TZ:-UTC}
    depends_on:
      algoengine:
        condition: service_healthy
    networks:
      - algo-network

  # ── Redis (Cache & Pub/Sub) ──────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: algoengine-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --save 60 1
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - algo-network

  # ── Monitoring Agent ─────────────────────────────────────────────────
  monitor:
    build:
      context: ./monitor
      dockerfile: Dockerfile
    image: algoengine-monitor:latest
    container_name: algoengine-monitor
    restart: unless-stopped
    ports:
      - "9090:9090"
    environment:
      - ENGINE_URL=http://algoengine:8000
      - TZ=${TZ:-UTC}
    depends_on:
      algoengine:
        condition: service_healthy
    networks:
      - algo-network

  # ── Prometheus ───────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: algoengine-prometheus
    restart: unless-stopped
    ports:
      - "9091:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alerting_rules.yml:/etc/prometheus/alerting_rules.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--web.enable-lifecycle"
    depends_on:
      monitor:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - algo-network

  # ── Grafana ──────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    container_name: algoengine-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_INSTALL_PLUGINS=
      - GF_SERVER_ROOT_URL=http://localhost:3001
      - TZ=${TZ:-UTC}
    volumes:
      - ./monitoring/grafana/datasources/prometheus.yml:/etc/grafana/provisioning/datasources/prometheus.yml:ro
      - ./monitoring/grafana/dashboards/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
      - ./monitoring/grafana/dashboards/algoengine-overview.json:/etc/grafana/provisioning/dashboards/algoengine-overview.json:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - algo-network

  # ── Elasticsearch ───────────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.0
    container_name: algoengine-elasticsearch
    restart: unless-stopped
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
      - cluster.name=algoengine-logs
      - node.name=algoengine-es-node
      - TZ=${TZ:-UTC}
    volumes:
      - ./logging/elasticsearch/elasticsearch.yml:/usr/share/elasticsearch/config/elasticsearch.yml:ro
      - es-data:/usr/share/elasticsearch/data
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 60s
    networks:
      - algo-network

  # ── Logstash ─────────────────────────────────────────────────────────
  logstash:
    image: docker.elastic.co/logstash/logstash:8.14.0
    container_name: algoengine-logstash
    restart: unless-stopped
    ports:
      - "9600:9600"
    environment:
      - LS_JAVA_OPTS=-Xms256m -Xmx512m
      - ES_PASSWORD=""
      - TZ=${TZ:-UTC}
    volumes:
      - ./logging/logstash/logstash.yml:/usr/share/logstash/config/logstash.yml:ro
      - ./logging/logstash/pipelines.yml:/usr/share/logstash/config/pipelines.yml:ro
      - ./logging/logstash/conf.d/algoengine.conf:/usr/share/logstash/pipeline/conf.d/algoengine.conf:ro
      - ./logs:/var/log/algoengine:ro
      - logstash-data:/usr/share/logstash/data
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9600"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - algo-network

  # ── Kibana ───────────────────────────────────────────────────────────
  kibana:
    image: docker.elastic.co/kibana/kibana:8.14.0
    container_name: algoengine-kibana
    restart: unless-stopped
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - xpack.security.enabled=false
      - TZ=${TZ:-UTC}
    volumes:
      - ./logging/kibana/kibana.yml:/usr/share/kibana/config/kibana.yml:ro
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5601/api/status"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 60s
    networks:
      - algo-network

volumes:
  redis-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  es-data:
    driver: local
  logstash-data:
    driver: local

networks:
  algo-network:
    driver: bridge