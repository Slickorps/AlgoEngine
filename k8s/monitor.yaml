apiVersion: apps/v1
kind: Deployment
metadata:
  name: algoengine-monitor
  namespace: algoengine
  labels:
    app.kubernetes.io/name: monitor
    app.kubernetes.io/component: monitoring
    app.kubernetes.io/part-of: algoengine
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: monitor
      app.kubernetes.io/component: monitoring
  template:
    metadata:
      labels:
        app.kubernetes.io/name: monitor
        app.kubernetes.io/component: monitoring
    spec:
      containers:
        - name: monitor
          image: algoengine-monitor:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9090
              protocol: TCP
              name: http
          envFrom:
            - configMapRef:
                name: algoengine-config
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "300m"
              memory: "128Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 9090
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: algoengine-monitor
  namespace: algoengine
  labels:
    app.kubernetes.io/name: monitor
    app.kubernetes.io/component: monitoring
    app.kubernetes.io/part-of: algoengine
spec:
  selector:
    app.kubernetes.io/name: monitor
    app.kubernetes.io/component: monitoring
  ports:
    - port: 9090
      targetPort: 9090
      protocol: TCP
      name: http
  type: ClusterIP