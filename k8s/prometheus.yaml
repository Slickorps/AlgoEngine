apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: algoengine
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/component: monitoring
    app.kubernetes.io/part-of: algoengine
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
      scrape_timeout: 10s
      external_labels:
        project: algoengine
        environment: k8s

    alerting:
      alertmanagers:
        - static_configs:
            - targets: []

    rule_files:
      - /etc/prometheus/alerting_rules.yml

    scrape_configs:
      - job_name: "algoengine-monitor"
        scrape_interval: 10s
        metrics_path: "/metrics"
        static_configs:
          - targets:
              - "algoengine-monitor:9090"
            labels:
              service: algoengine-monitor
              component: monitoring-agent

      - job_name: "prometheus"
        scrape_interval: 30s
        static_configs:
          - targets:
              - "localhost:9090"
  alerting_rules.yml: |
    groups:
      - name: algoengine_trading
        interval: 30s
        rules:
          - alert: EngineDown
            expr: algoengine_engine_up == 0
            for: 2m
            labels:
              severity: critical
              category: infrastructure
            annotations:
              summary: "AlgoEngine core engine is unreachable"
              description: "Trading engine has been down for more than 2 minutes."

          - alert: EngineHighLatency
            expr: algoengine_avg_latency_ms > 5000
            for: 5m
            labels:
              severity: warning
              category: performance
            annotations:
              summary: "High order execution latency detected"
              description: "Average latency is {{ $value }}ms."

          - alert: HighDrawdown
            expr: algoengine_max_drawdown > 20
            for: 2m
            labels:
              severity: critical
              category: risk
            annotations:
              summary: "Maximum drawdown exceeds risk threshold"
              description: "Current max drawdown is {{ $value }}%."

          - alert: NegativePnL
            expr: algoengine_total_pnl < -10000
            for: 5m
            labels:
              severity: warning
              category: risk
            annotations:
              summary: "Significant unrealized losses"
              description: "Total P&L is {{ $value }}."

          - alert: HighScrapeErrorRate
            expr: rate(algoengine_scrape_errors_total[5m]) > 0.1
            for: 5m
            labels:
              severity: critical
              category: infrastructure
            annotations:
              summary: "High scrape error rate detected"

          - alert: NoActiveStrategies
            expr: algoengine_active_strategies == 0
            for: 10m
            labels:
              severity: warning
              category: trading
            annotations:
              summary: "No active trading strategies running"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: algoengine
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/component: monitoring
    app.kubernetes.io/part-of: algoengine
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: prometheus
  template:
    metadata:
      labels:
        app.kubernetes.io/name: prometheus
        app.kubernetes.io/component: monitoring
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.53.0
          ports:
            - containerPort: 9090
              protocol: TCP
              name: http
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
            - "--storage.tsdb.retention.time=15d"
            - "--web.enable-lifecycle"
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
              readOnly: true
            - name: data
              mountPath: /prometheus
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 9090
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9090
            initialDelaySeconds: 15
            periodSeconds: 15
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: algoengine
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/component: monitoring
    app.kubernetes.io/part-of: algoengine
spec:
  selector:
    app.kubernetes.io/name: prometheus
  ports:
    - port: 9090
      targetPort: 9090
      protocol: TCP
      name: http
  type: ClusterIP
