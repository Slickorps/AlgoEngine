apiVersion: v1
kind: ConfigMap
metadata:
  name: logstash-config
  namespace: algoengine
  labels:
    app.kubernetes.io/name: logstash
    app.kubernetes.io/component: logging
    app.kubernetes.io/part-of: algoengine
data:
  logstash.yml: |
    http.host: 0.0.0.0
    http.port: 9600
    config.reload.automatic: true
    config.reload.interval: 30s
    pipeline.batch.size: 125
    pipeline.batch.delay: 50
    log.level: info
  algoengine.conf: |
    input {
      file {
        path => "/var/log/algoengine/*.log"
        start_position => "beginning"
        sincedb_path => "/usr/share/logstash/data/sincedb/algoengine.db"
        discover_interval => 15
        stat_interval => 15
        add_field => { "service" => "algoengine" "environment" => "production" }
        tags => ["algoengine", "logfile"]
      }
      file {
        path => "/var/log/algoengine/error/*.log"
        start_position => "beginning"
        sincedb_path => "/usr/share/logstash/data/sincedb/algoengine_error.db"
        discover_interval => 15
        stat_interval => 15
        add_field => { "service" => "algoengine" "environment" => "production" }
        tags => ["algoengine", "error", "logfile"]
      }
    }
    filter {
      if "logfile" in [tags] {
        grok {
          match => {
            "message" => [
              "%{TIMESTAMP_ISO8601:log_timestamp} | %{DATA:level_raw}| %{DATA:logger} | %{DATA:funcName}:%{INT:lineno} | %{GREEDYDATA:parsed_msg}",
              "%{TIMESTAMP_ISO8601:log_timestamp} | %{DATA:level_raw}| %{DATA:logger} | %{GREEDYDATA:parsed_msg}"
            ]
          }
          tag_on_failure => ["_grokparsefailure"]
        }
        if "_grokparsefailure" not in [tags] {
          mutate {
            replace => { "message" => "%{parsed_msg}" }
            remove_field => ["parsed_msg"]
          }
          date {
            match => ["log_timestamp", "yyyy-MM-dd HH:mm:ss,SSS", "yyyy-MM-dd HH:mm:ss"]
            target => "@timestamp"
          }
          ruby {
            code => '
              level_val = event.get("level_raw")
              if level_val
                level_clean = level_val.gsub(/\e\[[0-9;]*m/, "").strip
                event.set("level", level_clean)
              end
            '
          }
          mutate { remove_field => ["level_raw", "log_timestamp"] }
        }
      }
    }
    output {
      if "_grokparsefailure" in [tags] {
        elasticsearch {
          hosts => ["http://elasticsearch:9200"]
          index => "algoengine-logs-parsefailures-%{+YYYY.MM.dd}"
          manage_template => false
        }
      } else {
        elasticsearch {
          hosts => ["http://elasticsearch:9200"]
          index => "algoengine-logs-%{+YYYY.MM.dd}"
          manage_template => false
          action => "create"
        }
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: logstash
  namespace: algoengine
  labels:
    app.kubernetes.io/name: logstash
    app.kubernetes.io/component: logging
    app.kubernetes.io/part-of: algoengine
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: logstash
  template:
    metadata:
      labels:
        app.kubernetes.io/name: logstash
        app.kubernetes.io/component: logging
    spec:
      containers:
        - name: logstash
          image: docker.elastic.co/logstash/logstash:8.14.0
          ports:
            - containerPort: 9600
              protocol: TCP
              name: api
          env:
            - name: LS_JAVA_OPTS
              value: "-Xms256m -Xmx512m"
          volumeMounts:
            - name: config
              mountPath: /usr/share/logstash/config/logstash.yml
              subPath: logstash.yml
              readOnly: true
            - name: pipeline-config
              mountPath: /usr/share/logstash/pipeline/algoengine.conf
              subPath: algoengine.conf
              readOnly: true
            - name: data
              mountPath: /usr/share/logstash/data
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /
              port: 9600
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: config
          configMap:
            name: logstash-config
        - name: pipeline-config
          configMap:
            name: logstash-config
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: logstash
  namespace: algoengine
  labels:
    app.kubernetes.io/name: logstash
    app.kubernetes.io/component: logging
    app.kubernetes.io/part-of: algoengine
spec:
  selector:
    app.kubernetes.io/name: logstash
  ports:
    - port: 9600
      targetPort: 9600
      protocol: TCP
      name: api
  type: ClusterIP
