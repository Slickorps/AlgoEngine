apiVersion: apps/v1
kind: Deployment
metadata:
  name: algoengine
  namespace: algoengine
  labels:
    app.kubernetes.io/name: algoengine
    app.kubernetes.io/component: engine
    app.kubernetes.io/part-of: algoengine
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: algoengine
      app.kubernetes.io/component: engine
  template:
    metadata:
      labels:
        app.kubernetes.io/name: algoengine
        app.kubernetes.io/component: engine
    spec:
      containers:
        - name: engine
          image: algoengine:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              protocol: TCP
              name: http
          envFrom:
            - configMapRef:
                name: algoengine-config
            - secretRef:
                name: algoengine-secret
                optional: true
          volumeMounts:
            - name: config
              mountPath: /app/config
              readOnly: true
            - name: data
              mountPath: /app/data
            - name: logs
              mountPath: /app/logs
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30
      volumes:
        - name: config
          configMap:
            name: algoengine-config-files
            optional: true
        - name: data
          emptyDir: {}
        - name: logs
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: algoengine
  namespace: algoengine
  labels:
    app.kubernetes.io/name: algoengine
    app.kubernetes.io/component: engine
    app.kubernetes.io/part-of: algoengine
spec:
  selector:
    app.kubernetes.io/name: algoengine
    app.kubernetes.io/component: engine
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
      name: http
  type: ClusterIP