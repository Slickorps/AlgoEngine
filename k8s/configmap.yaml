apiVersion: v1
kind: ConfigMap
metadata:
  name: algoengine-config
  namespace: algoengine
  labels:
    app.kubernetes.io/name: algoengine
    app.kubernetes.io/part-of: algoengine
data:
  # Core engine configuration
  ALGOENGINE_ENV: "production"
  ALGOENGINE_MODE: "paper"
  ALGOENGINE_PORT: "8000"
  REDIS_URL: "redis://algoengine-redis:6379/0"
  TZ: "UTC"

  # Dashboard configuration
  DASHBOARD_PORT: "3000"
  ENGINE_API_URL: "http://algoengine:8000"
  ENGINE_WS_URL: "ws://algoengine:8000/ws"
  DASHBOARD_REFRESH: "2000"

  # Monitor configuration
  ENGINE_URL: "http://algoengine:8000"