env: development
debug: false
timezone: UTC

database:
  host: localhost
  port: 5432
  name: algoengine
  user: algo
  password: ""
  pool_size: 10
  max_overflow: 20

redis:
  host: localhost
  port: 6379
  db: 0
  password: null

logging:
  level: INFO
  dir: logs
  max_bytes: 10485760  # 10MB
  backup_count: 5
  console_output: true
  file_output: true

data:
  data_dir: data
  cache_size: 1000
  max_history_days: 3650
  providers:
    yahoo:
      enabled: true
      rate_limit: 2000
    alpha_vantage:
      enabled: false
      api_key: ""
      rate_limit: 5

trading:
  default_broker: paper
  paper_trading: true
  max_position_size: 1.0
  max_drawdown_pct: 0.1
  default_currency: USD
  commission_rate: 0.001
  slippage_model: fixed
  slippage_value: 0.0

risk:
  enabled: true
  max_daily_loss_pct: 0.02
  max_position_pct: 0.1
  max_leverage: 1.0
  stop_loss_pct: 0.02
  circuit_breaker_enabled: true

plugins:
  enabled: true
  plugins_dir: plugins
  auto_discover: false
  sandbox_enabled: false
  max_plugins: 50
  timeout_seconds: 30

custom: {}
